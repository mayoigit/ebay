<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
            overflow: hidden;
        }

        .login-box {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1;
            position: relative;
            width: 300px;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #0074d9;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #005fa3;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }

        /* Loading animation */
        .loading {
            margin-bottom: 20px;
            display: none;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #0074d9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }

        /* Moving 3D eBay text */
        .bg-text {
            position: absolute;
            font-size: 100px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
            animation: moveText 10s linear infinite;
            text-shadow: 2px 2px 5px #000;
        }

        @keyframes moveText {
            0% {transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);}
            25% {transform: translate(50%, -50%) rotateX(180deg) rotateY(90deg);}
            50% {transform: translate(50%, 50%) rotateX(360deg) rotateY(180deg);}
            75% {transform: translate(-50%, 50%) rotateX(540deg) rotateY(270deg);}
            100% {transform: translate(-50%, -50%) rotateX(720deg) rotateY(360deg);}
        }
    </style>
</head>
<body>
    <div class="bg-text">eBay</div>

    <div class="login-box">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="error" id="error-msg">Incorrect password</div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const loading = document.getElementById('loading');
            const loginBox = document.querySelector('.login-box');

            if(username === 'lenamybaby' && password === '123321##') {
                // Hide error, show loading animation
                errorMsg.style.display = 'none';
                loading.style.display = 'block';

                // Random time between 2 and 8 seconds
                const randomTime = Math.floor(Math.random() * (8 - 2 + 1) + 2) * 1000;

                // Disable inputs and button
                loginBox.querySelectorAll('input, button').forEach(el => el.disabled = true);

                setTimeout(() => {
                    // Redirect to index.html
                       window.location.href = 'http://htmlpreview.github.io/?https://github.com/mayoigit/ebay/blob/main/main.html';}, randomTime);
            } 
        }
    </script>
</body>
</html>
